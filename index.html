<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ROJO | Taller Técnico</title>
    <style>
        :root { --neon: #ff0000; --fondo-oscuro: rgba(0,0,0,0.75); }
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { 
            background: url('rojoportada.png') no-repeat center center fixed; 
            background-size: cover; 
            font-family: 'Segoe UI', Roboto, sans-serif; 
            overflow: hidden; 
            cursor: crosshair; 
        }
        body::before { 
            content: ''; 
            position: fixed; 
            top: 0; left: 0; 
            width: 100%; height: 100%; 
            background: rgba(0, 0, 0, 0.5); 
            z-index: -1; 
        }

        /* Logo principal */
        #logo-principal { 
            position: absolute; 
            top: 20px; left: 50%; 
            transform: translateX(-50%); 
            z-index: 1000; 
        }
        #logo-principal img { 
            width: 120px; 
            filter: drop-shadow(0 0 15px var(--neon)); 
            alt="Logotipo oficial de ROJO Ingeniería Automotriz";
        }

        /* Galería */
        .galeria { 
            position: absolute; 
            top: 120px; left: 20px; 
            width: 300px; 
            max-height: 70vh; 
            overflow-y: auto; 
            padding: 10px 5px; 
            background: var(--fondo-oscuro); 
            border: 1px solid var(--neon); 
            border-radius: 8px;
        }
        .galeria::-webkit-scrollbar { width: 6px; }
        .galeria::-webkit-scrollbar-thumb { background: var(--neon); border-radius: 3px; }

        .item { 
            display: flex; align-items: center; gap: 15px; 
            padding: 10px; margin-bottom: 8px;
            border-left: 4px solid var(--neon); 
            cursor: pointer; 
            transition: all 0.2s ease; 
            color: #fff; 
            border-radius: 0 6px 6px 0;
        }
        .item:hover { 
            background: rgba(255, 0, 0, 0.2); 
            border-left: 10px solid #ff3333; 
            padding-left: 20px;
        }
        .item img { 
            width: 100px; height: 70px; 
            object-fit: cover; border-radius: 4px; 
        }
        .item p { font-size: 0.9rem; font-weight: 500; }

        /* Visor de imágenes */
        #visor { 
            position: fixed; 
            top: 0; left: 0; 
            width: 100%; height: 100%; 
            background: rgba(0,0,0,0.95); 
            display: none; 
            justify-content: center; align-items: center; 
            z-index: 9999; 
            cursor: zoom-out;
        }
        #visor img { 
            max-width: 85%; max-height: 75vh; 
            border: 3px solid var(--neon); 
            box-shadow: 0 0 30px var(--neon); 
            border-radius: 8px;
            alt="Vista ampliada del proyecto seleccionado";
        }

        /* Logo SIDC */
        #logo-sidc { 
            position: fixed; 
            bottom: 25px; left: 180px; 
            z-index: 1000; 
            transition: transform 0.2s ease; 
        }
        #logo-sidc img { 
            width: 55px; height: auto; 
            border-radius: 50%; 
            filter: drop-shadow(0 0 8px #fff); 
            alt="Ir a SIDC - Servicios Integrales Cázares";
        }
        #logo-sidc:hover { transform: scale(1.15); }

        /* Bocho volador */
        #bocho-volador { 
            position: fixed; 
            bottom: 20px; left: -150px; 
            width: 150px; height: auto;
            z-index: 1000; 
            filter: drop-shadow(0 0 15px var(--neon)); 
            pointer-events: none; 
            alt="Vocho clásico modificado por ROJO";
        }
        .vuelo { animation: moverSuave 5s linear forwards; }
        @keyframes moverSuave { 
            0% { left: -150px; transform: rotate(0deg); } 
            10% { transform: rotate(2deg); }
            90% { transform: rotate(-2deg); }
            100% { left: 100vw; transform: rotate(0deg); } 
        }

        /* Efecto chispas */
        #canvas-chispas { 
            position: fixed; 
            top: 0; left: 0; 
            pointer-events: none; 
            z-index: 9999; 
        }
    </style>
</head>

    <script>
        // Función para abrir imágenes
        function abrir(src) { 
            document.getElementById("imgGrande").src = src; 
            document.getElementById("visor").style.display = "flex"; 
        }
        
        // Animación del Bocho: vuela cada 10 segundos
        setInterval(() => {
            const b = document.getElementById("bocho-volador");
            b.classList.add("vuelo");
            setTimeout(() => b.classList.remove("vuelo"), 5000);
        }, 10000);

        // Efecto de chispas al hacer clic
        const canvas = document.getElementById('canvas-chispas');
        canvas.width = window.innerWidth; 
        canvas.height = window.innerHeight;
        const ctx = canvas.getContext('2d');
        
        window.addEventListener('click', (e) => {
            for(let i=0; i<20; i++) crearChispa(e.clientX, e.clientY);
        });

        function crearChispa(x, y) {
            let p = { x, y, vx: (Math.random()-0.5)*10, vy: (Math.random()-0.5)*10, alpha: 1 };
            let anim = setInterval(() => {
                ctx.fillStyle = `rgba(255, 69, 0, ${p.alpha})`;
                ctx.beginPath(); 
                ctx.arc(p.x, p.y, 2, 0, Math.PI*2); 
                ctx.fill();
                p.x += p.vx; 
                p.y += p.vy; 
                p.alpha -= 0.05;
                if (p.alpha <= 0) clearInterval(anim);
            }, 30);
        }

        // Ajustar canvas si cambia el tamaño de pantalla
        window.addEventListener('resize', () => {
            canvas.width = window.innerWidth;
            canvas.height = window.innerHeight;
        });
